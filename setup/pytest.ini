[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
filterwarnings =
    ignore:Using `@model_validator` with mode='after' on a classmethod is deprecated.*:pydantic.warnings.PydanticDeprecatedSince212
markers =
    live: marks tests that require GEMINI_LIVE_TESTS=1 (deselect with '-m "not live"')
    record: marks tests that record live API responses (deselect with '-m "not record"')
