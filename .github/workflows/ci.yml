name: CI

on:
  push:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r setup/requirements.txt
          pip install -r setup/requirements-dev.txt

      - name: Syntax check all Python files
        run: |
          python -m compileall -q core adapters scripts setup gemini_skill_install setup.py

      - name: Run tests with coverage
        run: |
          pytest -c setup/pytest.ini \
            --cov=core \
            --cov=adapters \
            --cov-report=term-missing \
            --cov-fail-under=95

      - name: Verify no cgi imports (Python 3.13 compat)
        run: |
          ! grep -r "^import cgi\|^from cgi" core adapters

      - name: Verify no typing.Any usage (ban-Any invariant)
        run: |
          ! grep -rnE 'from typing import.*\bAny\b|typing\.Any|: Any\b|-> Any\b' \
              core/ adapters/ scripts/ setup/ gemini_skill_install/ --include="*.py"

      - name: Verify no single-character local variable names (naming hygiene)
        run: |
          set -e
          ! grep -rnE '\bfor [a-hj-z]\b in\b' core/ adapters/ scripts/ setup/ gemini_skill_install/ --include="*.py"
          ! grep -rnE '\blambda [a-hj-z]:' core/ adapters/ scripts/ setup/ gemini_skill_install/ --include="*.py"
          ! grep -rnE 'except [A-Za-z._(, ]+\bas [a-hj-z]\s*:' core/ adapters/ scripts/ setup/ gemini_skill_install/ --include="*.py"
          ! grep -rnE '^\s+[a-hj-z] =[^=]' core/ adapters/ scripts/ setup/ gemini_skill_install/ --include="*.py"

      - name: Strict typing on new refactor surface
        run: |
          mypy --strict \
            core/transport/ \
            core/auth/auth.py \
            core/infra/config.py \
            core/infra/errors.py \
            core/infra/checksums.py \
            core/infra/filelock.py \
            core/infra/timeouts.py \
            core/cli/install_main.py \
            core/cli/update_main.py \
            core/cli/health_main.py \
            core/cli/dispatch.py \
            core/cli/installer/ \
            gemini_skill_install/ \
            adapters/generation/imagen.py \
            adapters/generation/live.py \
            adapters/media/image_gen.py \
            adapters/tools/search.py \
            adapters/data/files.py \
            scripts/gemini_run.py

      - name: Build bootstrap installer distributions
        if: ${{ matrix.python-version == '3.13' }}
        run: |
          python -m build

  # Phase 8: dual-backend live integration matrix. Gated on
  # workflow_dispatch (manual trigger only) so PRs from forks never
  # expose the secret GEMINI_API_KEY. Runs the full integration
  # suite twice with inverted priority flags so both SDK-primary
  # and raw-HTTP-primary paths are exercised against the real
  # Gemini API.
  live-integration:
    name: Live integration (${{ matrix.backend }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        backend: [sdk, raw_http]
        include:
          - backend: sdk
            is_sdk_priority: "true"
            is_rawhttp_priority: "false"
          - backend: raw_http
            is_sdk_priority: "false"
            is_rawhttp_priority: "true"
    env:
      GEMINI_LIVE_TESTS: "1"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IS_SDK_PRIORITY: ${{ matrix.is_sdk_priority }}
      GEMINI_IS_RAWHTTP_PRIORITY: ${{ matrix.is_rawhttp_priority }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r setup/requirements.txt
          pip install -r setup/requirements-dev.txt

      - name: Run live integration tests (${{ matrix.backend }} primary)
        run: |
          pytest -c setup/pytest.ini tests/integration/ -v
